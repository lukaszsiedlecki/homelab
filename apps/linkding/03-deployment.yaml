apiVersion: apps/v1
kind: Deployment
metadata:
  name: linkding
  namespace: homelab
  labels:
    app: linkding
spec:
  replicas: 1
  selector:
    matchLabels:
      app: linkding
  template:
    metadata:
      labels:
        app: linkding
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000

      containers:
        - name: linkding
          image: sissbruecker/linkding:latest
          ports:
            - name: http
              containerPort: 9090
          
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL                       
            readOnlyRootFilesystem: false

          envFrom:
            - secretRef:
                name: linkding-secret
          volumeMounts:
            - name: linkding-data
              mountPath: /etc/linkding/data
      volumes:
        - name: linkding-data
          persistentVolumeClaim:
            claimName: linkding-data
