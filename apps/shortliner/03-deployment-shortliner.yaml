apiVersion: apps/v1
kind: Deployment
metadata:
  name: shortliner
  namespace: shortliner
  labels:
    app: shortliner
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: shortliner
  template:
    metadata:
      labels:
        app: shortliner
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: shortliner
          image: ghcr.io/lukaszsiedlecki/shortliner:sha-94f835c
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=75.0"
            - name: DB_HOST
              value: "192.168.0.78"
            - name: DB_NAME
              value: "shortliner"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: shortliner-secret
                  key: SHORTLINER_DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shortliner-secret
                  key: SHORTLINER_DB_PASSWORD
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "my-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
