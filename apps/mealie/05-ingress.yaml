apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mealie
  namespace: homelab
spec:
  ingressClassName: nginx
  rules:
    - host: mealie.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mealie
                port:
                  number: 80