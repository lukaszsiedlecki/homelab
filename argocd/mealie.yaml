apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mealie
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/luk-asz-si/homelab.git'
    targetRevision: HEAD
    path: apps/mealie
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: homelab
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
